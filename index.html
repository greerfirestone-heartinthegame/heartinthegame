<!DOCTYPE html>
<html>
<head>
  <title>Heart in the Game AI Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    #response {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      min-height: 100px;
    }

    input {
      width: 80%;
      padding: 10px;
    }

    button {
      padding: 10px 20px;
    }
  </style>
</head>
<body>

<h1>Heart in the Game AI Assistant</h1>

<input id="msg" placeholder="Ask a question..." />
<button onclick="send()">Send</button>

<div id="response"></div>

<script>
async function send() {
  const msg = document.getElementById('msg').value;

  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      message: msg
    })
  });

  const data = await response.json();

  document.getElementById('response').innerText =
    data.reply || JSON.stringify(data);
}
</script>

</body>
</html>
